<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found - Punith P portfolio." />
  <meta name="robots" content="noindex" />
  <title>404 | Page Not Found</title>
  <link rel="canonical" href="https://your-portfolio-url/404.html" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg" />
  <link rel="preload" href="css/main.css" as="style" />
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .not-found-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .not-found-card {
      width: min(560px, 100%);
      text-align: center;
      padding: 2rem 1.2rem;
    }

    .not-found-title {
      font-size: clamp(1.8rem, 4vw, 2.3rem);
      margin-bottom: 0.45rem;
    }

    .not-found-text {
      color: var(--text-2);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <main class="not-found-wrap">
    <section class="not-found-card glass-card" aria-label="Page not found section">
      <p class="kicker">404</p>
      <h1 class="not-found-title">Page not found</h1>
      <p class="not-found-text">The page you are looking for does not exist or may have been moved.</p>
      <a class="btn btn-primary" href="index.html" aria-label="Go back to homepage">Go Home</a>
    </section>
  </main>
</body>
</html>
